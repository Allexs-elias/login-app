<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Login</h3>

          <!-- Campo email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="ejemplo@correo.com"
              [(ngModel)]="email"
              name="email">
          </div>

          <!-- Campo password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="******"
              [(ngModel)]="password"
              name="password">
          </div>

          <!-- Mensaje de error.
               Solo se muestra si mensajeError tiene algo escrito.
               @if es la forma moderna de hacer condicionales en Angular -->
          @if (mensajeError !== '') {
            <div class="alert alert-danger">
              {{ mensajeError }}
            </div>
          }

          <!-- Boton aceptar -->
          <button class="btn btn-primary w-100" (click)="aceptar()">
            Aceptar
          </button>

        </div>
      </div>
    </div>
  </div>
</div>
