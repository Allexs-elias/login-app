<!-- Header arriba con la navegacion.
     navbar = barra de navegacion de Bootstrap
     bg-dark + navbar-dark = fondo oscuro con texto claro -->
<nav class="navbar navbar-dark bg-dark px-4">

  <!-- Lado izquierdo del header: nombre de la pagina -->
  <span class="navbar-brand">Mi Pagina</span>

  <!-- Lado derecho del header: secciones y boton salir -->
  <div>
    <a href="#" class="text-white me-3">Sec 1</a>
    <a href="#" class="text-white me-3">Sec 2</a>
    <a href="#" class="text-white me-3">Sec 3</a>
    <button class="btn btn-outline-light btn-sm" (click)="salir()">Salir</button>
  </div>
</nav>
